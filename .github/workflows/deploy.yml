name: CD — Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  # ─────────────────────────────────────────────
  # FASE ACTUAL: Deploy al NAS via runner self-hosted
  # El runner corre en Docker en el propio NAS.
  # No necesita puertos abiertos — conexión saliente a GitHub.
  # ─────────────────────────────────────────────
  deploy-nas:
    name: Deploy al NAS (fase actual)
    runs-on: [self-hosted, nas]           # ejecuta en el runner del NAS
    needs: []                             # sin dependencia de CI — el runner lo controla

    steps:
      - name: Checkout código en el NAS
        uses: actions/checkout@v4

      - name: Extraer versión del tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
          fi

      - name: Pull y rebuild en NAS
        working-directory: /volume1/docker/revio
        run: |
          echo "🔄 Iniciando deploy ${{ steps.version.outputs.VERSION }}..."
          git pull origin main
          docker-compose -f docker-compose.nas.yml build app
          docker-compose -f docker-compose.nas.yml up -d app
          sleep 10

      - name: Ejecutar migraciones de BD
        working-directory: /volume1/docker/revio
        run: |
          docker-compose -f docker-compose.nas.yml exec -T app alembic upgrade head

      - name: Verificar health check
        run: |
          sleep 5
          curl -f http://localhost:8000/health || (echo "❌ Health check fallido" && exit 1)
          echo "✅ App respondiendo correctamente"

      - name: Notificar deploy completado
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.BOT_ADMIN_CHAT_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${ADMIN_CHAT_ID}" \
            -d "text=✅ Deploy ${VERSION} en NAS completado — $(date '+%d/%m/%Y %H:%M')"

      - name: Notificar fallo
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.BOT_ADMIN_CHAT_ID }}
        run: |
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${ADMIN_CHAT_ID}" \
            -d "text=❌ FALLO en deploy NAS — revisar GitHub Actions"

