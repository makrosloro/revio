name: CD — Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  # ─────────────────────────────────────────────
  # CI — Tests previos al deploy
  # Reutiliza la lógica de ci.yml para garantizar
  # que nunca se despliega código roto.
  # ─────────────────────────────────────────────
  test:
    name: Tests previos al deploy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: negociosano_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar migraciones
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test_password@localhost/negociosano_test
        run: alembic upgrade head

      - name: Ejecutar tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test_password@localhost/negociosano_test
          TELEGRAM_BOT_TOKEN: fake_token_for_tests
          GOOGLE_PLACES_API_KEY: fake_key_for_tests
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_fake
          STRIPE_PRO_PRICE_ID: price_pro_fake
          STRIPE_MULTI_PRICE_ID: price_multi_fake
          ANTHROPIC_API_KEY: fake_key_for_tests
          WEBHOOK_URL: https://api.negociosano.com
          BOT_ADMIN_CHAT_ID: "123456789"
          DB_PASSWORD: test_password
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # DEPLOY — SSH al VPS via GitHub Actions
  # Solo se ejecuta si los tests pasan.
  # Despliega en negociosano.com vía SSH.
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy al VPS (negociosano.com)
    runs-on: ubuntu-latest
    needs: test                           # solo despliega si los tests pasan

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Extraer versión
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Deploy al VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_PROJECT_PATH }}

            echo "🔄 Iniciando deploy ${{ steps.version.outputs.VERSION }}..."

            # Actualizar código
            git pull origin main

            # Rebuild y restart solo del contenedor app (la BD no se toca)
            docker-compose -f docker-compose.prod.yml build app
            docker-compose -f docker-compose.prod.yml up -d app

            # Esperar a que la app arranque
            sleep 15

            # Ejecutar migraciones pendientes
            docker-compose -f docker-compose.prod.yml exec -T app alembic upgrade head

            # Health check
            curl -f http://localhost:8000/health || (echo "❌ Health check fallido" && exit 1)

            echo "✅ Deploy ${{ steps.version.outputs.VERSION }} completado"

      - name: Notificar éxito por Telegram
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.BOT_ADMIN_CHAT_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${ADMIN_CHAT_ID}" \
            -d "text=✅ NegocioSano ${VERSION} desplegado en producción — $(date '+%d/%m/%Y %H:%M')"

      - name: Notificar fallo por Telegram
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID: ${{ secrets.BOT_ADMIN_CHAT_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${ADMIN_CHAT_ID}" \
            -d "text=❌ FALLO en deploy ${VERSION} — revisar GitHub Actions"
