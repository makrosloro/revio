<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Admin{% endblock %} — NegocioSano</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:'#16a34a','brand-dark':'#15803d'}}}}</script>
</head>
<body class="bg-gray-50 text-gray-800 text-sm">

<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-56 bg-gray-900 text-gray-300 flex flex-col flex-shrink-0">
    <div class="px-5 py-5 border-b border-gray-700">
      <span class="text-white font-bold text-base">🌿 NegocioSano</span>
      <p class="text-xs text-gray-500 mt-0.5">Panel de administración</p>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/admin/" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 hover:text-white transition {% if active=='dashboard' %}bg-gray-700 text-white{% endif %}">
        📊 Dashboard
      </a>
      <a href="/admin/businesses" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 hover:text-white transition {% if active=='businesses' %}bg-gray-700 text-white{% endif %}">
        🏪 Negocios
      </a>
      <a href="/admin/reviews" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 hover:text-white transition {% if active=='reviews' %}bg-gray-700 text-white{% endif %}">
        ⭐ Reseñas
      </a>
      <a href="/admin/users" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 hover:text-white transition {% if active=='users' %}bg-gray-700 text-white{% endif %}">
        👤 Usuarios
      </a>
    </nav>
    <div class="px-5 py-4 border-t border-gray-700 text-xs text-gray-500">
      api.negociosano.com
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Topbar -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
      <h1 class="font-semibold text-gray-700">{% block heading %}{% endblock %}</h1>
      <div class="flex gap-3">
        {% block actions %}{% endblock %}
      </div>
    </header>

    <!-- Content -->
    <div class="flex-1 overflow-auto p-6">
      {% if msg %}
      <div class="mb-4 bg-green-50 border border-green-200 text-green-800 rounded-lg px-4 py-3 text-sm">
        ✅ {{ msg }}
      </div>
      {% endif %}
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

</body>
</html>
